spring:
  datasource:
    url: jdbc:h2:mem:testdb;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;NON_KEYWORDS=VALUE
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: create-drop
    database-platform: org.hibernate.dialect.H2Dialect
    show-sql: false
  flyway:
    enabled: false

storage:
  s3:
    endpoint: http://localhost:9000
    access-key: any
    secret-key: any
    bucket: test-bucket
    signed-url-expiry-seconds: 3600

application:
  email:
    smtp:
      enabled: false

github:
  api:
    token:
  repository:
    name: alphnology/open-schedule
