spring:
  datasource:
    url: jdbc:h2:mem:testdb;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;NON_KEYWORDS=VALUE
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: create-drop
    database-platform: org.hibernate.dialect.H2Dialect
    show-sql: false
  flyway:
    enabled: false

storage:
  s3:
    endpoint: http://localhost:9000
    access-key: any
    secret-key: any
    bucket: test-bucket
    signed-url-expiry-seconds: 3600

application:
  email:
    defaults:
      outbound-enabled: false
      provider-type: SMTP
      security-mode: STARTTLS
      authentication-enabled: true
      connection-timeout-ms: 5000
      read-timeout-ms: 5000
    smtp:
      host: localhost
      port: 1025
      username:
      password:
      ssl-trust:
    from:
      address: no-reply@example.com
      name: Open Schedule
    postal:
      enabled: false
      base-url:
      api-key:
      api-key-header: X-Server-API-Key

github:
  api:
    token:
  repository:
    name: alphnology/open-schedule
