logging:
  level:
    org:
      atmosphere: warn

server:
  port: ${PORT:51675}


vaadin:
  allowed-packages: com.vaadin,org.vaadin,dev.hilla,com.alphnology,com.github.appreciated.apexcharts
  # Launch the default browser when starting the application in development mode
  launch-browser: true
  pnpm:
    enable: true
#  frontend:
#    hotdeploy=true:

management:
  endpoint:
    health:
      show-details: when-authorized
  endpoints:
    web:
      exposure:
        include: health

spring:
  jackson:
    default-property-inclusion: non_null
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB
  flyway:
    enabled: true
    baseline-on-migrate: true
    baseline-version: 0
    locations: [ classpath:db/migration/prod ] #, filesystem:./sql
    placeholderReplacement: false
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false

  mustache:
    check-template-location: false

  # PostgreSQL configuration.
  datasource:
    password: ${DB_PASSWORD:postgres}
    username: ${DB_USER:postgres}
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5433}/${DB_NAME:open-schedule}
    driver-class-name: org.postgresql.Driver

  thymeleaf:
    enabled: true

event:
  website: ${EVENT_WEBSITE:https://alphnology.com}
  schedule: ${EVENT_SCHEDULE:https://alphnology.com}
# Variable Formatter.
application:
  url: ${APP_URL:https://alphnology.com}
  name: ${APP_NAME:@project.description@}
  version: @project.version@


  formatter:
    date: ${FORMATTER_DATE:MM-dd-yyyy}
    time: ${FORMATTER_TIME:HH:mm}
    time-12: ${FORMATTER_TIME_12:hh:mm a}
    datetime: ${FORMATTER_DATE_TIME:MM-dd-yyyy HH:mm}
    date-time-12: ${FORMATTER_DATE_TIME_12:MM-dd-yyyy hh:mm a}
    decimal: ${FORMATTER_DECIMAL:#,##0.00}

  notification:
    time: ${NOTIFICATION_TIME:3000}

  pattern:
    password: '^(?=.*[0-9])(?=.*[a-zA-Z])(?=.*[!@#$%&*()_+.]).{5,}$'
    email: '^[\w-\.]+@([\w-]+\.)+[\w-]{2,}$'

  email:
    settings-master-key: ${EMAIL_SETTINGS_MASTER_KEY:}
    allow-ui-secret-persistence: ${EMAIL_ALLOW_UI_SECRET_PERSISTENCE:false}
    defaults:
      outbound-enabled: ${EMAIL_OUTBOUND_ENABLED:${EMAIL_SMTP_ENABLED:true}}
      provider-type: ${EMAIL_PROVIDER_TYPE:SMTP}
      security-mode: ${EMAIL_SECURITY_MODE:STARTTLS}
      authentication-enabled: ${EMAIL_AUTH_ENABLED:true}
      connection-timeout-ms: ${EMAIL_CONNECTION_TIMEOUT_MS:10000}
      read-timeout-ms: ${EMAIL_READ_TIMEOUT_MS:10000}
    from:
      address: ${EMAIL_FROM_ADDRESS:#{null}}
      name: ${EMAIL_FROM_NAME:Open Schedule}
    smtp:
      host: ${EMAIL_SMTP_HOST:}
      port: ${EMAIL_SMTP_PORT:587}
      username: ${EMAIL_SMTP_USERNAME:}
      password: ${EMAIL_SMTP_PASSWORD:}
      ssl-trust: ${EMAIL_SMTP_SSL_TRUST:}
    postal:
      enabled: ${POSTAL_ENABLED:false}
      base-url: ${POSTAL_BASE_URL:}
      api-key: ${POSTAL_API_KEY:}
      api-key-header: ${POSTAL_API_KEY_HEADER:X-Server-API-Key}


storage:
  s3:
    endpoint: ${STORAGE_ENDPOINT:http://localhost:9000}
    access-key: ${STORAGE_ACCESS_KEY:minioadmin}
    secret-key: ${STORAGE_SECRET_KEY:minioadmin}
    bucket: ${STORAGE_BUCKET:open-schedule}
    public-endpoint: ${STORAGE_PUBLIC_ENDPOINT:}
    signed-url-expiry-seconds: ${STORAGE_SIGNED_URL_EXPIRY:3600}

github:
  api:
    token: ${GIT_HUB_API_TOKEN:}
  repository:
    name: ${GIT_HUB_REPOSITORY_NAME:alphnology/open-schedule}
---
spring:
  config:
    activate:
      on-profile: dev
  flyway:
    enabled: true
    locations: [ classpath:db/migration/prod, classpath:db/migration/dev ] #, filesystem:./sql
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false

  devtools:
    restart:
      enabled: true  # Set to enable hot deployment
      additional-paths: src/main/java # restart directory
      quiet-period: 1s
      poll-interval: 2s
      log-condition-evaluation-delta: false

application:
  url: http://localhost:${server.port}
