services:
  postgres:
    image: postgres:18
    volumes:
      - db_postgres:/var/lib/postgresql
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=open-schedule
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres -d open-schedule" ]
      interval: 10s
      timeout: 5s
      retries: 5

  mailpit:
    image: axllent/mailpit:latest
    restart: unless-stopped
    ports:
      - "1025:1025"
      - "8025:8025"
    environment:
      MP_SMTP_AUTH_ACCEPT_ANY: "1"
      MP_SMTP_AUTH_ALLOW_INSECURE: "1"

  seaweedfs:
    image: chrislusf/seaweedfs:latest
    command: server -s3 -s3.port=8333 -dir=/data -master.volumeSizeLimitMB=1024 -ip.bind=0.0.0.0
    ports:
      - "9333:9333"   # master API
      - "8080:8080"   # volume API
      - "8333:8333"   # S3-compatible API
    volumes:
      - seaweedfs_data:/data
    healthcheck:
      test: [ "CMD-SHELL", "wget -qO- http://localhost:9333/cluster/status || exit 1" ]
      interval: 15s
      timeout: 5s
      retries: 5

volumes:
  db_postgres:
  seaweedfs_data: